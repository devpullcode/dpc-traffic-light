name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: NODE_ENV=production gulp buildForDeploy

      - name: Copy index.html to build directory
        run: cp index.html build/

      - name: Update paths in index.html
        run: |
          sed -i 's|href="build/css/main.css"|href="css/main.css"|' build/index.html
          sed -i 's|href="build/css/fontawesome.css"|href="css/fontawesome.css"|' build/index.html
          sed -i 's|href="build/css/normalize.css"|href="css/normalize.css"|' build/index.html
          sed -i 's|src="build/js/|src="js/|' build/index.html
          sed -i 's|src="build/img/|src="img/|' build/index.html
          sed -i 's|srcset="build/img/|srcset="img/|' build/index.html

      - name: Deploy to gh-pages branch
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Clonar el repositorio y crear la rama gh-pages si no existe
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/devpullcode/dpc-traffic-light.git"
          cd dpc-traffic-light
          git checkout gh-pages || git checkout --orphan gh-pages

          # Sincronizar el contenido del directorio build con la rama gh-pages
          rsync -av --delete ../build/ ./

          # Agregar y hacer commit de los cambios
          git add --all
          git commit -m 'Deploy to gh-pages'

          # Empujar los cambios a la rama gh-pages
          git push "https://x-access-token:${{ secrets.GH_PAT }}@github.com/devpullcode/dpc-traffic-light.git" gh-pages
